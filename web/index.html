<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BatteryGuard" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0A0E21" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="description" content="Smart car battery diagnostics via OBD-II Bluetooth" />
    <title>BatteryGuard AI</title>
    <link rel="manifest" href="/batteryguard/manifest.json" />
    <link rel="apple-touch-icon" href="/batteryguard/assets/icon.png" />
    <link rel="icon" href="/batteryguard/favicon.ico" />
    <style id="expo-reset">
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #0A0E21;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      * {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      input, textarea {
        -webkit-user-select: auto;
        user-select: auto;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        overflow: hidden;
      }
      @supports (padding: env(safe-area-inset-top)) {
        body {
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script src="/batteryguard/_expo/static/js/web/__BUNDLE__" defer></script>
  </body>
</html>
